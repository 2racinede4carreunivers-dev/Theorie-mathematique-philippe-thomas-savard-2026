# Workflow GitHub Actions pour la génération automatique de Questions/Réponses
# Théorie Mathématique Philippe Thomas Savard 2026
#
# Ce workflow s'exécute après la compilation des documents et génère des Q&R
# basées sur le contenu des fichiers .tex, .thy et .pdf

name: Génération Q&R Intelligente

on:
  # Déclenché après le build principal (à adapter selon votre workflow existant)
  workflow_run:
    workflows: ["Build"]  # Nom de votre workflow de build existant
    types:
      - completed
    branches:
      - main
  
  # Ou déclenché manuellement
  workflow_dispatch:
    inputs:
      language:
        description: 'Langue de génération'
        required: false
        default: 'fr'
        type: choice
        options:
          - fr
          - en
          - both
      questions_count:
        description: 'Nombre de questions à générer'
        required: false
        default: '11'
        type: string

# Permissions nécessaires
permissions:
  contents: read
  actions: read

jobs:
  generate-qa:
    name: Générer Questions/Réponses
    runs-on: ubuntu-latest
    
    # Ne s'exécute que si le build précédent a réussi (pour workflow_run)
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    
    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Historique complet pour les références
      
      - name: Configuration Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Installation des dépendances
        run: |
          python -m pip install --upgrade pip
          pip install emergentintegrations --extra-index-url https://d33sy5i8bnduwe.cloudfront.net/simple/
          if [ -f scripts/requirements.txt ]; then
            pip install -r scripts/requirements.txt
          fi
      
      - name: Vérification de la clé API
        run: |
          if [ -z "${{ secrets.EMERGENT_LLM_KEY }}" ]; then
            echo "::error::La clé EMERGENT_LLM_KEY n'est pas configurée dans les secrets"
            exit 1
          fi
          echo "✅ Clé API configurée"
      
      - name: Création des répertoires
        run: |
          mkdir -p qa_bank
          mkdir -p qa_output
      
      - name: Génération des Questions/Réponses
        env:
          EMERGENT_LLM_KEY: ${{ secrets.EMERGENT_LLM_KEY }}
          GITHUB_SHA: ${{ github.sha }}
          GENERATION_LANGUAGE: ${{ github.event.inputs.language || 'fr' }}
        run: |
          cd scripts
          python qa_generator.py
      
      - name: Résumé de la génération
        run: |
          echo "## 📚 Résumé de la Génération Q&R" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -f qa_output/*.json ]; then
            TOTAL=$(cat qa_output/*.json | python3 -c "import sys,json; data=json.load(sys.stdin); print(data.get('total_questions', 0))")
            echo "**Questions générées:** $TOTAL" >> $GITHUB_STEP_SUMMARY
          fi
          
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📋 Prochaines étapes" >> $GITHUB_STEP_SUMMARY
          echo "1. Téléchargez l'artifact 'qa-generated'" >> $GITHUB_STEP_SUMMARY
          echo "2. Examinez les Q&R dans le fichier Markdown" >> $GITHUB_STEP_SUMMARY
          echo "3. Utilisez \`qa_validator.py\` pour valider les bonnes Q&R" >> $GITHUB_STEP_SUMMARY
          echo "4. Committez la banque mise à jour" >> $GITHUB_STEP_SUMMARY
      
      - name: Upload des Q&R générées
        uses: actions/upload-artifact@v4
        with:
          name: qa-generated-${{ github.sha }}
          path: |
            qa_output/
            qa_bank/qa_bank.db
          retention-days: 30
          if-no-files-found: warn
      
      - name: Notification de succès
        if: success()
        run: |
          echo "✅ Génération de Q&R terminée avec succès!"
          echo "📦 Les fichiers sont disponibles dans l'artifact 'qa-generated-${{ github.sha }}'"

  # Job optionnel pour générer en anglais (désactivé par défaut)
  generate-qa-english:
    name: Générer Q&R (English)
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.language == 'en' || github.event.inputs.language == 'both' }}
    needs: generate-qa
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install emergentintegrations --extra-index-url https://d33sy5i8bnduwe.cloudfront.net/simple/
      
      - name: Generate English Q&A
        env:
          EMERGENT_LLM_KEY: ${{ secrets.EMERGENT_LLM_KEY }}
          GENERATION_LANGUAGE: 'en'
        run: |
          # Activer l'anglais dans la config temporairement
          cd scripts
          python -c "
          import json
          with open('qa_config.py', 'r') as f:
              content = f.read()
          content = content.replace('\"en\": {\n        \"enabled\": False', '\"en\": {\n        \"enabled\": True')
          with open('qa_config.py', 'w') as f:
              f.write(content)
          "
          python qa_generator.py
      
      - name: Upload English Q&A
        uses: actions/upload-artifact@v4
        with:
          name: qa-generated-english-${{ github.sha }}
          path: qa_output/
          retention-days: 30
